# Cargo build configuration — optimized for development speed on M3 Max
#
# sccache: caches compiled artifacts across branches and clean builds.
# Split debuginfo: faster linking by not embedding debug info in binaries.

[build]
rustc-wrapper = "sccache"

[profile.dev]
# Split debuginfo — much faster linking on macOS
split-debuginfo = "unpacked"

[profile.dev.package."*"]
# Optimize dependencies even in dev mode — they rarely change,
# and optimized deps run faster in tests (especially serde).
opt-level = 1

[alias]
# `cargo t` = `cargo test`. Do NOT switch to `cargo nextest run` — nextest's
# test-discovery phase spawns every test binary in parallel with `--list`,
# which hangs forever under macOS code-signing verification. amfid/syspolicyd
# serialize parallel binary-verification XPC calls in a way that deadlocks
# on this workspace. `cargo test` invokes test binaries sequentially and is
# safe. See memory: feedback_cargo_test_not_nextest.md.
t = "test"

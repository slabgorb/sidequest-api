# Fixture for Story 39-5 — genre uses the STANDALONE advancements.yaml host.
# Affinities exist but carry NO mechanical_effects; the advancement tree
# lives entirely in the sibling advancements.yaml file.
max_level: 5
milestones_per_level: 3
milestone_categories:
  - combat
  - social
  - exploration
affinities:
  - name: Narrative
    description: "Flavor-only affinity — no mechanical hooks."
    triggers: ["speak plainly"]
    tier_thresholds: [1, 3, 6]
    unlocks:
      tier_1:
        name: "Narrative Tier 1"
        description: "Flavor unlock."
        abilities: []
